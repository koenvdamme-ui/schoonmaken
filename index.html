<style>
  :root{
    --bg:#EDF1EA;
    --surface:#FBFCF9;
    --ink:#1B2A26;
    --muted:#5E726B;
    --line:#D8E0D6;
    --primary:#1F4E4A;
    --primary-soft:#DCE8E4;
    --maxime:#B0543B;       /* warm terracotta = M */
    --maxime-soft:#F6E2DA;
    --koen:#2A6085;         /* blue = K */
    --koen-soft:#DCE7EE;
    --accent:#E0A33E;
    --done:#7E9A8F;
    --radius:14px;
    --shadow:0 1px 2px rgba(27,42,38,.06), 0 6px 20px rgba(27,42,38,.06);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }

  /* ---------- Header ---------- */
  header{
    background:var(--primary);
    color:#F3F7F2;
    padding:34px 20px 30px;
    position:relative;
    overflow:hidden;
  }
  header .wrap{max-width:1000px;margin:0 auto;position:relative;z-index:1}
  .eyebrow{
    font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin-bottom:8px;
  }
  header h1{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:800;font-size:clamp(1.9rem,5vw,3rem);
    line-height:1.02;letter-spacing:-.02em;
  }
  header p.sub{margin-top:10px;color:#C7D8D2;max-width:46ch;font-size:.96rem}
  .header-deco{
    position:absolute;right:-40px;top:-30px;opacity:.13;z-index:0;
    transform:rotate(8deg);
  }
  .today-pill{
    display:inline-flex;align-items:center;gap:8px;margin-top:18px;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    padding:7px 14px;border-radius:999px;font-size:.85rem;font-weight:500;
  }
  .today-pill b{font-weight:700;color:#fff}

  main{max-width:1000px;margin:0 auto;padding:0 20px}

  /* ---------- Vooruitblik ---------- */
  .lookahead{
    margin-top:-22px;position:relative;z-index:2;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;
    margin-bottom:30px;
  }
  .look-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;box-shadow:var(--shadow);
  }
  .look-card .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
  .look-card .val{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.15rem;margin-top:3px;color:var(--primary)}
  .look-card .meta{font-size:.8rem;color:var(--muted);margin-top:2px}
  .look-card.due .val{color:var(--accent)}

  /* ---------- Sectie ---------- */
  .section{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:18px;box-shadow:var(--shadow);overflow:hidden;
  }
  .section-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 20px;cursor:pointer;user-select:none;
  }
  .section-head:hover{background:#F3F6F1}
  .section-head .left{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .section-head h2{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.2rem;
    letter-spacing:-.01em;
  }
  .period-tag{
    font-size:.78rem;color:var(--muted);font-weight:500;
    background:var(--primary-soft);color:var(--primary);
    padding:3px 9px;border-radius:999px;
  }
  .head-right{display:flex;align-items:center;gap:12px}
  .progress-mini{font-size:.8rem;color:var(--muted);font-weight:500;white-space:nowrap}
  .chev{transition:transform .2s ease;color:var(--muted)}
  .section.collapsed .chev{transform:rotate(-90deg)}
  .section.collapsed .section-body{display:none}

  .section-body{padding:4px 20px 18px}

  /* ---------- Twee kolommen M / K ---------- */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .col{border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .col-head{
    padding:10px 14px;display:flex;align-items:center;gap:10px;font-weight:700;
    font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;
  }
  .col.maxime .col-head{background:var(--maxime-soft);color:var(--maxime)}
  .col.koen .col-head{background:var(--koen-soft);color:var(--koen)}
  .badge{
    width:26px;height:26px;border-radius:7px;display:grid;place-items:center;
    color:#fff;font-weight:800;font-size:.9rem;flex:none;
  }
  .col.maxime .badge{background:var(--maxime)}
  .col.koen .badge{background:var(--koen)}
  .col-count{margin-left:auto;font-size:.78rem;font-weight:600;color:var(--muted)}

  ul.tasks{list-style:none}
  ul.tasks li{border-top:1px solid var(--line)}
  ul.tasks li:first-child{border-top:none}
  label.task{
    display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;
    font-size:.92rem;transition:background .12s;
  }
  label.task:hover{background:#F4F7F3}
  label.task input{position:absolute;opacity:0;pointer-events:none}
  .check{
    width:21px;height:21px;border-radius:6px;border:2px solid var(--line);
    flex:none;display:grid;place-items:center;transition:.15s;background:#fff;
  }
  .check svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:.15s}
  label.task input:checked ~ .check{background:var(--done);border-color:var(--done)}
  label.task input:checked ~ .check svg{opacity:1;transform:scale(1)}
  label.task input:checked ~ .txt{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1.5px}
  label.task input:focus-visible ~ .check{outline:2px solid var(--accent);outline-offset:2px}
  .txt{transition:.15s}

  .empty-col{padding:14px;color:var(--muted);font-size:.85rem;font-style:italic}

  /* ---- Niet-deze-week (uitgegrijsd, niet aanklikbaar) ---- */
  .section.inactive .section-head h2{color:var(--muted)}
  .section.inactive .cols{opacity:.5;filter:grayscale(.85)}
  .section.inactive label.task{cursor:default}
  .section.inactive label.task:hover{background:none}
  .section.inactive .check{border-style:dashed}
  .progress-mini.not-due{color:var(--accent);font-style:italic}
  .due-note{
    background:#FBF2DD;border:1px solid #EAD9AE;color:#8A6A20;
    font-size:.84rem;border-radius:10px;padding:9px 12px;margin:8px 0 12px;
  }

  .reset-row{display:flex;justify-content:flex-end;margin-top:12px}
  .reset-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    font:inherit;font-size:.8rem;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .reset-btn:hover{border-color:var(--maxime);color:var(--maxime)}

  footer{max-width:1000px;margin:30px auto 0;padding:0 20px;color:var(--muted);font-size:.82rem;text-align:center}
  footer .legend{display:inline-flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
  footer .legend span{display:inline-flex;align-items:center;gap:6px}
  footer .dot{width:12px;height:12px;border-radius:4px;display:inline-block}

  @media(max-width:560px){
    .cols{grid-template-columns:1fr}
    .section-head{padding:14px}
    .section-body{padding:4px 12px 14px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <svg class="header-deco" width="220" height="220" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="48" stroke="#fff" stroke-width="1"/>
    <circle cx="50" cy="50" r="34" stroke="#fff" stroke-width="1"/>
    <circle cx="50" cy="50" r="20" stroke="#fff" stroke-width="1"/>
  </svg>
  <div class="wrap">
    <div class="eyebrow">Huishouden &middot; M &amp; K</div>
    <h1>Het Rooster</h1>
    <p class="sub">Wie doet wat, deze periode. De taken wisselen vanzelf van kolom. Vink af wat klaar is, je voortgang blijft in deze browser bewaard.</p>
    <div class="today-pill" id="todayPill">&nbsp;</div>
  </div>
</header>

<main>
  <section class="lookahead" id="lookahead" aria-label="Vooruitblik"></section>
  <div id="sections"></div>
</main>

<footer>
  <div class="legend">
    <span><i class="dot" style="background:var(--maxime)"></i> M</span>
    <span><i class="dot" style="background:var(--koen)"></i> K</span>
    <span><i class="dot" style="background:var(--done)"></i> Afgevinkt</span>
  </div>
  <div>Voortgang wordt lokaal in je browser bewaard (localStorage). Niets wordt online opgeslagen.</div>
</footer>

<script>
/* ============================================================
   CONFIG: categorieen, taken en rotatie
   ============================================================ */
/* base = standaard-eigenaar per taak (M of K) in de basisperiode.
   In de volgende periode wisselt alles vanzelf om.
   Wekelijks is bewust verankerd: Schoon beddengoed bij M, Vuilnis weggooien bij K.
   vast = taken die NIET meeroteren (blijven altijd bij de eigenaar uit base).
   "Bank en stoelpoten stofzuigen" staat vast op M: tweewekelijks valt altijd in een even week,
   en in even weken doet M sowieso de wekelijkse stofzuigbeurt. */
const CATS = [
  {
    id:'week', titel:'Wekelijks', tag:'deze week',
    taken:['Schoon beddengoed','Toiletten schoon','Keuken schoon','Koelkast nalopen',
           'Stofzuigen boven en beneden','Doekje over wastafel','Vuilnis weggooien',
           'Pluisfilter droger','Planten water geven'],
    base: ['M','K','M','K','M','K','K','K','M'],
  },
  {
    id:'twee', titel:'Tweewekelijks', tag:'deze 2 weken',
    taken:['Dweilen beneden','Douche + dweilen','Badkamer','Bank en stoelpoten stofzuigen',
           'Stoffen vensterbanken','Kelder luchten'],
    base: ['K','M','K','M','M','K'],
    vast: [false,false,false,true,false,false],
  },
  {
    id:'maand', titel:'Maandelijks', tag:'deze maand',
    taken:['Deuren + deurklinken','Meubels afnemen','Lampen schoonmaken','Keukendeurtjes',
           'Vaatwasser reinigen','Wasmachine rubber','Wasmachine filter'],
    base: ['M','K','M','K','M','K','M'],
  },
  {
    id:'kwartaal', titel:'Per kwartaal', tag:'dit kwartaal',
    taken:['Ramen lappen','Waterkoker ontkalken','Oven schoonmaken','Oven condensor',
           'Stof + spinrag plafond','Dekentjes + kussenhoezen','Afzuigkap'],
    base: ['M','K','M','K','M','K','M'],
  },
  {
    id:'half', titel:'Halfjaarlijks', tag:'dit halfjaar',
    taken:['Vriezer ontdooien','Heel huis van bovenaf','Binnen keukenkastjes','Bovenkast leeghalen + poetsen',
           'Randen + tussen radiatoren','Badkamerkasten','Hoofdkussens wassen'],
    base: ['M','K','M','K','M','K','M'],
  },
  {
    id:'jaar', titel:'Jaarlijks', tag:'dit jaar',
    taken:['Gordijnen wassen','Dekbed wassen','Stoelen onderhouden','Muren + stopcontacten','Snoeren reinigen'],
    base: ['M','K','M','K','M'],
  },
];

const NAMES = {M:'M', K:'K'};

/* ============================================================
   DATUM-HELPERS
   ============================================================ */
function isoWeek(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (date.getUTCDay() + 6) % 7;          // ma=0 ... zo=6
  date.setUTCDate(date.getUTCDate() - dayNum + 3);    // donderdag van deze week
  const firstThursday = new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const firstDayNum = (firstThursday.getUTCDay() + 6) % 7;
  firstThursday.setUTCDate(firstThursday.getUTCDate() - firstDayNum + 3);
  return 1 + Math.round((date - firstThursday) / (7*24*3600*1000));
}

/* Per categorie: een uniek period-id (voor opslag/reset), rotatie-pariteit (0/1),
   en of de categorie deze week aan de beurt is (due). */
function periodInfo(catId, now){
  const y = now.getFullYear();
  const m = now.getMonth();          // 0-11
  const w = isoWeek(now);
  let r;
  switch(catId){
    case 'week':     r = {pid:`${y}-W${w}`, parity:w%2,           label:`Week ${w}`}; break;
    case 'twee': {
      const due = (w % 2 === 0);             // tweewekelijks doe je in de even weken
      const c   = Math.floor(w/2);
      r = {pid:`${y}-T${c}`, parity:c%2, due, dueLabel:`weer in week ${w+1}`,
           label: due ? `Week ${w}` : `pas weer week ${w+1}`};
      break;
    }
    case 'maand': {
      const dueM = (now.getDate() <= 7);      // maandelijks doe je in de eerste week van de maand
      const volgendeMaand = maandNaam((m+1)%12);
      r = {pid:`${y}-M${m}`, parity:m%2, due:dueM, dueLabel:`weer in ${volgendeMaand.toLowerCase()}`,
           label: dueM ? maandNaam(m) : maandNaam(m)};
      break;
    }
    case 'kwartaal': {const q=Math.floor(m/3); r = {pid:`${y}-Q${q}`, parity:q%2, label:`Q${q+1} ${y}`}; break;}
    case 'half':     {const h=Math.floor(m/6); r = {pid:`${y}-H${h}`, parity:h%2, label:(h===0?'Jan t/m jun':'Jul t/m dec')+' '+y}; break;}
    case 'jaar':     r = {pid:`${y}`, parity:y%2,                 label:`${y}`}; break;
  }
  if(r.due === undefined) r.due = true;
  return r;
}

function maandNaam(m){
  return ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'][m];
}

/* Wie doet taak i deze periode? base[i] is de standaard; bij parity 1 wisselt alles om,
   behalve vaste taken (vast[i] === true), die blijven altijd bij hun base-eigenaar. */
function persoonVoor(i, parity, base, vast){
  const owner = base[i];
  if(vast && vast[i]) return owner;       // vaste taak: roteert niet mee
  if(parity === 0) return owner;
  return owner === 'M' ? 'K' : 'M';
}

/* ============================================================
   OPSLAG
   ============================================================ */
const KEY = (catId, pid, i) => `huisrooster_v1::${catId}::${pid}::${i}`;
function isDone(catId,pid,i){ return localStorage.getItem(KEY(catId,pid,i)) === '1'; }
function setDone(catId,pid,i,val){
  if(val) localStorage.setItem(KEY(catId,pid,i),'1');
  else localStorage.removeItem(KEY(catId,pid,i));
}
function resetCat(catId,pid,n){ for(let i=0;i<n;i++) setDone(catId,pid,i,false); }

/* ============================================================
   VOORUITBLIK
   ============================================================ */
function dagenTot(date, now){
  return Math.ceil((date - now) / (24*3600*1000));
}
function nextQuarterStart(now){
  const m = now.getMonth(), y = now.getFullYear();
  const nextQ = (Math.floor(m/3)+1)*3;
  return nextQ > 11 ? new Date(y+1,0,1) : new Date(y,nextQ,1);
}
function nextHalfStart(now){
  const m = now.getMonth(), y = now.getFullYear();
  return m < 6 ? new Date(y,6,1) : new Date(y+1,0,1);
}
function nextMonthStart(now){
  return new Date(now.getFullYear(), now.getMonth()+1, 1);
}
function fmtCountdown(dagen){
  if(dagen <= 7) return {txt:`nog ${dagen} ${dagen===1?'dag':'dagen'}`, due:true};
  const wk = Math.round(dagen/7);
  if(dagen <= 56) return {txt:`over ~${wk} ${wk===1?'week':'weken'}`, due:dagen<=14};
  const mnd = Math.round(dagen/30);
  return {txt:`over ~${mnd} ${mnd===1?'maand':'maanden'}`, due:false};
}

function renderLookahead(now){
  const el = document.getElementById('lookahead');
  const items = [
    {lbl:'Nieuwe maand', date:nextMonthStart(now)},
    {lbl:'Nieuw kwartaal', date:nextQuarterStart(now)},
    {lbl:'Nieuw halfjaar', date:nextHalfStart(now)},
  ];
  el.innerHTML = items.map(it=>{
    const d = dagenTot(it.date, now);
    const c = fmtCountdown(d);
    const dd = String(it.date.getDate()).padStart(2,'0');
    return `<div class="look-card ${c.due?'due':''}">
      <div class="lbl">${it.lbl}</div>
      <div class="val">${c.txt}</div>
      <div class="meta">vanaf ${dd} ${maandNaam(it.date.getMonth()).toLowerCase()}</div>
    </div>`;
  }).join('');
}

/* ============================================================
   RENDER SECTIES
   ============================================================ */
function countDone(cat, info){
  let n=0;
  cat.taken.forEach((_,i)=>{ if(isDone(cat.id,info.pid,i)) n++; });
  return n;
}

function renderSections(now){
  const wrap = document.getElementById('sections');
  wrap.innerHTML = '';

  CATS.forEach(cat=>{
    const info = periodInfo(cat.id, now);

    // verdeel taken over M en K
    const groepen = {M:[], K:[]};
    cat.taken.forEach((t,i)=>{
      groepen[persoonVoor(i,info.parity,cat.base,cat.vast)].push({t,i});
    });

    const done = countDone(cat, info);
    const total = cat.taken.length;
    const due = info.due;

    const sec = document.createElement('section');
    sec.className = 'section' + (due ? '' : ' inactive');

    const progressHTML = due
      ? `<span class="progress-mini">${done}/${total} klaar</span>`
      : `<span class="progress-mini not-due">nu niet aan de beurt</span>`;

    const notice = due ? '' :
      `<div class="due-note">Nu niet aan de beurt &mdash; ${info.dueLabel || 'volgende periode'}. Ter info zichtbaar, je hoeft nog niets af te vinken.</div>`;

    sec.innerHTML = `
      <div class="section-head" role="button" tabindex="0" aria-expanded="true">
        <div class="left">
          <h2>${cat.titel}</h2>
          <span class="period-tag">${info.label}</span>
        </div>
        <div class="head-right">
          ${progressHTML}
          <svg class="chev" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="section-body">
        ${notice}
        <div class="cols">
          ${kolomHTML(cat,'M','maxime', groepen.M, info, due)}
          ${kolomHTML(cat,'K','koen', groepen.K, info, due)}
        </div>
        ${due ? `<div class="reset-row"><button class="reset-btn" data-reset="${cat.id}">Vinkjes wissen</button></div>` : ''}
      </div>`;
    wrap.appendChild(sec);

    // events
    const head = sec.querySelector('.section-head');
    head.addEventListener('click', ()=>toggleSection(sec,head));
    head.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSection(sec,head);}
    });

    if(due){
      sec.querySelectorAll('input[type=checkbox]').forEach(cb=>{
        cb.addEventListener('change', ()=>{
          setDone(cat.id, info.pid, parseInt(cb.dataset.idx,10), cb.checked);
          updateProgress(sec, cat, info);
        });
      });
      const resetBtn = sec.querySelector('[data-reset]');
      if(resetBtn) resetBtn.addEventListener('click', e=>{
        e.stopPropagation();
        resetCat(cat.id, info.pid, total);
        sec.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
        updateProgress(sec, cat, info);
      });
    }
  });
}

function kolomHTML(cat, key, klass, items, info, due){
  const head = `<div class="col-head"><span class="badge">${key}</span>
      <span class="col-count">${items.length} ${items.length===1?'taak':'taken'}</span></div>`;
  if(items.length===0){
    return `<div class="col ${klass}">${head}<div class="empty-col">Deze periode niets &mdash; lekker.</div></div>`;
  }
  const lis = items.map(({t,i})=>{
    const checked = (due && isDone(cat.id,info.pid,i)) ? 'checked' : '';
    const disabled = due ? '' : 'disabled';
    return `<li><label class="task">
        <input type="checkbox" data-idx="${i}" ${checked} ${disabled}>
        <span class="check"><svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 5" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="txt">${t}</span>
      </label></li>`;
  }).join('');
  return `<div class="col ${klass}">${head}<ul class="tasks">${lis}</ul></div>`;
}

function toggleSection(sec, head){
  sec.classList.toggle('collapsed');
  head.setAttribute('aria-expanded', sec.classList.contains('collapsed') ? 'false':'true');
}
function updateProgress(sec, cat, info){
  const done = countDone(cat, info);
  sec.querySelector('.progress-mini').textContent = `${done}/${cat.taken.length} klaar`;
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  const now = new Date();
  const dagen = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const dag = dagen[now.getDay()];
  const w = isoWeek(now);
  document.getElementById('todayPill').innerHTML =
    `Vandaag is <b>${dag} ${now.getDate()} ${maandNaam(now.getMonth()).toLowerCase()}</b> &middot; week ${w}`;

  renderLookahead(now);
  renderSections(now);
}
init();
</script>
</body>
</html>
